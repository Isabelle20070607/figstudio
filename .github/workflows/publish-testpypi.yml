name: publish-testpypi

on:
  workflow_dispatch:

jobs:
  build:
    name: build-distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: figstudio-dist
          path: dist/*

  publish:
    name: publish-to-testpypi
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/figstudio/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: figstudio-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke install from TestPyPI
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            python -m pip install --index-url https://pypi.org/simple/ "fastapi>=0.115" "matplotlib>=3.8" "numpy>=1.26" "pandas>=2.1" "pydantic>=2.7" "uvicorn[standard]>=0.30" &&
            python -m pip install --no-deps --index-url https://test.pypi.org/simple/ figstudio==0.2.0 && break
            sleep 20
          done
          figstudio --version
          timeout 20s figstudio demo --no-browser --port 8765 &
          for attempt in 1 2 3 4 5; do
            python - <<'PY' && exit 0
          import json
          import urllib.request
          with urllib.request.urlopen("http://127.0.0.1:8765/api/session", timeout=3) as response:
              print(json.loads(response.read().decode("utf-8"))["url"])
          PY
            sleep 2
          done
          exit 1
